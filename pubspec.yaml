name: flutter_netwatch
description: >
  A production-grade Flutter HTTP inspector with sensitive data masking,
  cURL export, Postman export, security analysis, floating bubble UI,
  and QA-ready notifications. Zero navigator conflicts. Auto-disabled
  in release builds.
version: 0.1.0
homepage: https://www.mujtaba.cc/
repository: https://github.com/iammujtaba44/flutter_netwatch
issue_tracker: https://github.com/iammujtaba44/flutter_netwatch/issues
funding:
  - https://buymeacoffee.com/immujtaba9h

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ">=4.0.0 <6.0.0"
  http: ^1.2.0
  chopper: ">=7.0.0 <9.0.0"
  share_plus: ^10.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.24.0
  lints: ^3.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
