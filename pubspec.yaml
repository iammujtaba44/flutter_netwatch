name: flutter_netwatch
description: >-
  Flutter HTTP inspector — capture Dio/http/Chopper traffic, mask secrets,
  export cURL/Postman/HAR, replay requests, view stats. Auto-off in release.
version: 0.2.1
homepage: https://www.mujtaba.cc/
repository: https://github.com/iammujtaba44/flutter_netwatch
issue_tracker: https://github.com/iammujtaba44/flutter_netwatch/issues
funding:
  - https://buymeacoffee.com/immujtaba9h

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ">=5.4.0 <6.0.0"
  http: ^1.2.0
  chopper: ">=8.0.0 <9.0.0"
  share_plus: ">=11.0.0 <14.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.24.0
  lints: ^3.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
